---
ancestor: 0.0.4
releases:
  1.0.0:
    release_date: '2026-03-25'
    codename: '2026-03-25'
    changes:
      release_summary: 'Migrate to Ansible 2.20 (breaking changes).'
      major_changes:
        - 'Ansible 2.20 migration.'
        - >
          Dev: Backend environment updated and auto-configured resolving Molecule
          25.1.0+ breakage (#301, #4380).
      minor_changes:
        - 'roles/* - Migrate remaining documentation.'
      breaking_changes:
        - >
          All roles have breaking changes. As ansible 2.19 resulted in touching a
          lot of old roles, the opportunity was used to update all roles and
          resolve issues with them. Changes across all roles include:

          * Feature Flags.
          * Migration to semantic versioning (collection and roles).
          * Ansible 2.20 support.
          * Removal of unused modules in the pre-release.

          All consumers must check roles. Major breaking changes will be avoided
          again until then next round of breaking ansible changes.
      deprecated_features:
        - 'N/A'
      removed_features:
        - 'roles/readarr'
      security_fixes:
        - 'N/A'
      bugfixes:
        - 'N/A'
    objects:
      role:
        - name: 'deluge'
          description: 'Deluge bittorrent client.'
          namespace: null
        - name: 'lidarr'
          description: 'Lidarr installation from public release tarball.'
          namespace: null
        - name: 'nzbget'
          description: 'NZBGet (nzbget.com) using maintained Debian release.'
          namespace: null
        - name: 'radarr'
          description: 'Radarr installation from public release tarball.'
          namespace: null
        - name: 'seerr'
          description: 'Seerr installation from public release tarball.'
          namespace: null
        - name: 'sonarr'
          description: 'Sonarr installation from public release tarball.'
          namespace: null
        - name: 'whisparr'
          description: 'Whisparr installation from public release tarball.'
          namespace: null